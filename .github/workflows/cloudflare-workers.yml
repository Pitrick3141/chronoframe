name: Cloudflare Workers

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate Worker build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare binding types
        run: pnpm cf:typegen

      - name: Validate D1 migrations locally
        run: pnpm d1:migrate:local

      - name: Lint
        run: pnpm lint

      - name: Build workspace dependencies
        run: pnpm build:deps

      - name: Type-check Worker and Vue application
        run: pnpm typecheck:server && pnpm typecheck

      - name: Build Worker
        run: pnpm build

      - name: Validate Wrangler bundle
        run: pnpm exec wrangler deploy --dry-run

  deploy:
    name: Migrate D1 and deploy
    # Never deploy a manually selected feature branch to production.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    needs: validate
    runs-on: ubuntu-24.04
    environment: production
    env:
      # STREAM is a capability binding; the application needs no Stream API token.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure production D1 binding
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$D1_DATABASE_ID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
            echo "CLOUDFLARE_D1_DATABASE_ID is missing or is not a D1 UUID." >&2
            exit 1
          fi
          sed -E -i "s/(\"database_id\"[[:space:]]*:[[:space:]]*\")[^\"]+(\")/\1${D1_DATABASE_ID}\2/" wrangler.jsonc
          grep -F "$D1_DATABASE_ID" wrangler.jsonc

      - name: Build Worker
        run: pnpm build:worker

      # Build before mutating D1, then apply migrations immediately before the
      # matching Worker artifact is deployed. Wrangler migrations are tracked
      # and idempotent, so a retry only applies migrations still pending.
      - name: Apply production D1 migrations
        run: pnpm d1:migrate:remote

      - name: Deploy Worker
        run: pnpm exec wrangler deploy

      - name: Deployment summary
        run: |
          echo "## Cloudflare Workers deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "D1 migrations applied and ChronoFrame deployed from \`${GITHUB_SHA}\`." >> "$GITHUB_STEP_SUMMARY"
